data:
  raw_dir: "data/raw"
  frames_dir: "data/frames"
  windows_dir: "data/windows"
  manifest_path: "data/manifest.csv"
  target_fps: 10
  resize:
    width: 640
    height: 360
  classes:
    - normal
    - anomaly
  class_to_idx:
    normal: 0
    anomaly: 1

shanghaitech:
  dataset_dir: "data/raw/shanghaitech"
  training_videos: "data/raw/shanghaitech/training/videos"
  testing_videos: "data/raw/shanghaitech/testing/frames"
  testing_masks: "data/raw/shanghaitech/testing/test_frame_mask"

sliding_window:
  window_size: 16
  stride: 8
  feature_height: 64
  feature_width: 64

training:
  window_size: 16
  batch_size: 16
  epochs: 50
  lr: 0.0003
  weight_decay: 0.0001
  patience: 10
  val_split: 0.2
  test_split: 0.1
  architecture: "convlstm"
  feature_channels: 2
  hidden_dim: 64
  num_classes: 2
  checkpoint_dir: "checkpoints/"
  drive_checkpoint_path: "/content/drive/MyDrive/v32/best_model.pth"

density:
  csrnet_weights: "checkpoints/csrnet_v31.pth"
  input_size: 640
  output_scale: 8

inference:
  checkpoint_path: "checkpoints/best_model.pth"
  device_density: "mps"
  device_flow: "cpu"
  device_classifier: "cpu"
  frame_skip: 4
  window_stride: 4
  output_width: 640
  timeline_height: 80

flow:
  method: "farneback"
  farneback:
    pyr_scale: 0.5
    levels: 3
    winsize: 15
    iterations: 3
    poly_n: 5
    poly_sigma: 1.2
    flags: 0
  raft:
    model_path: "checkpoints/raft-things.pth"
    small: true
  entropy_grid:
    rows: 4
    cols: 4